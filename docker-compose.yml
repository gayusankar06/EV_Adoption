services:

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8088:8080"
      - "7077:7077"
    volumes:
      - ./:/opt/project
    networks:
      - spark-network

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8089:8081"
    volumes:
      - ./:/opt/project
    networks:
      - spark-network

  spark-submit:
    build: .
    container_name: spark-submit
    depends_on:
      - spark-master
    volumes:
      - ./:/opt/project
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - SOCRATA_APP_TOKEN=${SOCRATA_APP_TOKEN}
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge